services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    ports:
      - "${SEARXNG_PORT:-4000}:8080"
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://searxng:8080}
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-change-me}
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped

  9router:
    image: decolua/9router:latest
    ports:
      - "${NINE_ROUTER_PORT:-20128}:20128"
    environment:
      - PORT=${NINE_ROUTER_PORT:-20128}
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/app/data
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - whatsmeow-data:/app/data
    restart: unless-stopped

volumes:
  redis-data:
  searxng-data:
  9router-data:
  whatsmeow-data:
