services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-56379}:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    ports:
      - "${SEARXNG_PORT:-54000}:8080"
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://searxng:8080}
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-change-me}
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./data/searxng:/etc/searxng
    restart: unless-stopped

  9router:
    image: decolua/9router:latest
    ports:
      - "${NINE_ROUTER_PORT:-52012}:20128"
    environment:
      - PORT=20128
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/app/data

    volumes:
      - ./data/9router:/app/data
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${APP_PORT:-53000}:3000"
    env_file: .env
    environment:
      - DATA_DIR=/app/data
      - REDIS_URL=redis://redis:6379
      - SEARXNG_BASE_URL=http://searxng:8080
      - NINE_ROUTER_BASE_URL=http://9router:20128/v1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data/whatsmeow:/app/data
    restart: unless-stopped
